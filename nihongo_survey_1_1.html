<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIってどう使ってる？みんなで話しましょう</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FFF9F0; font-family: 'Noto Sans JP', sans-serif; padding: 1.5rem 1rem 3rem; }
  .sw { max-width: 640px; margin: 0 auto; }

  .header-card {
    background: linear-gradient(135deg, #FFE5B4 0%, #FFDAB9 50%, #FFD1DC 100%);
    border-radius: 20px;
    padding: 1.5rem 1.5rem 1.2rem;
    margin-bottom: 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header-deco { position: absolute; font-size: 40px; opacity: 0.18; }
  .header-deco.d1 { top: -8px; left: 8px; }
  .header-deco.d2 { bottom: -10px; right: 10px; }
  .header-deco.d3 { top: 4px; right: 30px; font-size: 24px; opacity: 0.22; }
  .header-title { font-size: 17px; font-weight: 700; color: #C05A00; margin-bottom: 4px; }
  .header-sub { font-size: 12px; color: #D4722A; opacity: 0.85; }

  .form-card {
    background: #FFFDF7;
    border: 1.5px solid #FFE0A0;
    border-radius: 18px;
    padding: 1rem;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    border: none;
    border-radius: 12px;
    min-height: 900px;
  }
</style>
</head>
<body>
<div class="sw">
  <div class="header-card">
    <span class="header-deco d1">✨</span>
    <span class="header-deco d2">🍊</span>
    <span class="header-deco d3">💛</span>
    <div class="header-title">AIってどう使ってる？みんなで話しましょう🤖✨</div>
    <div class="header-sub">にほんご先生ラウンジ ／ ご回答よろしくお願いします🌼</div>
  </div>

  <div class="form-card">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSevlSFSATMmWwJ4u1fLT8DW7HpVCoOy8mub2HSJZZJX6-CFNQ/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
  </div>
</div>
</body>
</html>
